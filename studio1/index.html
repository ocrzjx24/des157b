<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>jason's blockbuster video</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery.ripples@0.6.3/dist/jquery.ripples.min.js"></script>

    <script src="script.js" defer></script>
</head>

<body>

    <div id="loader">
        <p>loading...</p>
    </div>

    <main class="container hidden">
        <section class="video-wrapper">

            <div class="ripple-layer"></div>

            <video id="mainVideo" muted autoplay loop playsinline>
                <source src="media/157b-blockbuster.webm" type="video/webm">
                <source src="media/157b-blockbuster.mp4" type="video/mp4">
                <p>
                    your browser does not support this video.
                    <a href="media/157b-blockbuster.mp4">download?</a>
                </p>
            </video>

        </section>
    </main>

</body>
</html>
