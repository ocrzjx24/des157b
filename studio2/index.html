<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>jason's picnic day 2026</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="script.js" defer></script>
</head>

<body>

  <header>
    <h1>picnic day 2026</h1>
    <p>a timeline of questionable phone calls / texts</p>
  </header>

  <div class="top-info">
    <span class="jason-says">jason says:</span>
    <span class="jason-talk">"hi guys!"</span>
  </div>

  <main>

    <section class="timeline-section">

      <div class="timeline-labels">
        <span>11:00 PM</span>
        <span>2:00 AM</span>
      </div>

      <div class="timeline-track">
        <div class="timeline-fill"></div>
        <div class="timeline-ticks"></div>

        <div class="popup">
            <!--
            <img class="popup-portrait" src="images/person.png" alt="">
            i had sketches of my friends, but i'm not super happy w them. maybe in the future
            -->
            <!-- directly take from json for the fields below -->
          <h2 class="popup-name"></h2>
          <p class="popup-time"></p>
          <p class="popup-dialogue"></p>
        </div>

        <!-- draggable jason -->
        <div class="drunk-head"><img src="images/jason1.png" alt="jx"></div>
      </div>

    </section>

  </main>

</body>
</html>
